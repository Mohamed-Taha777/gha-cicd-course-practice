name: part two of 91

on:
  pull_request:
    branches:
      - main
    types: [closed] # ضروري لمراقبة حالة الدمج

env:
  ACR_LOGIN_SERVER: example.azurecr.io
  IMAGE_NAME: tiny-health-app
  AKS_NAMESPACE: demo
  AKS_DEPLOYMENT: tiny-health-app
  AKS_CONTAINER: tiny-health-app

jobs:
  build-and-push-image:
    # هذا السطر يضمن أن العمليات ستبدأ فقط إذا تم الدمج (Merged) وليس مجرد الإغلاق
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4 # يفضل v4 للاستقرار

      - name: Set image tag
        id: image-tag
        run: |
          IMAGE_TAG="run-${GITHUB_RUN_NUMBER}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker buildx build \
            --push \
            --tag "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}" \
            --tag "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            .

  deploy-to-aks:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy image to AKS
        run: |
          kubectl set image "deployment/${{ env.AKS_DEPLOYMENT }}" \
            "${{ env.AKS_CONTAINER }}=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push-image.outputs.image_tag }}" \
            -n "${{ env.AKS_NAMESPACE }}"
          kubectl rollout status "deployment/${{ env.AKS_DEPLOYMENT }}" -n "${{ env.AKS_NAMESPACE }}" --timeout=5m
