name: 04 Deploy Workflow

on:
  workflow_dispatch:
  #workflow_run:
  #  workflows: ["03 Build Artifact Workflow"]
  #  types: [completed]

jobs:
  deploy-package:
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      BASE_IMAGE: python:3.12-slim
      APP_PORT: 8000
      IMAGE_NAME: tiny-health-app
      CONTAINER_NAME: tiny-health-container

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build Docker image with args
        run: |
          docker build \
            --build-arg BASE_IMAGE=${BASE_IMAGE} \
            --build-arg APP_PORT=${APP_PORT} \
            --build-arg IMAGE_NAME=${IMAGE_NAME} \
            --build-arg CONTAINER_NAME=${CONTAINER_NAME} \
            -t ${IMAGE_NAME}:latest \
            .

      - name: Run container
        run: |
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${APP_PORT}:${APP_PORT} \
            ${IMAGE_NAME}:latest

      - name: Smoke test
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:${APP_PORT}/health; then
              exit 0
            fi
            echo "Waiting for app..."
            sleep 2
          done
          echo "App not ready"
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f ${CONTAINER_NAME} || true
