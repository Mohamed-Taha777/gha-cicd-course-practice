name: 02 CI Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    # تعريف الـ outputs على مستوى الجوب مهم جداً لنقلها للجوب التالية
    outputs:
      matrix-versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - id: set-matrix
        run: |
          # استدعاء السيكريتات وتخزينها في متغيرات Bash
          V1="${{ secrets.secret1 }}"
          V2="${{ secrets.secret2 }}"
          
          # إذا كانت السيكريتات فارغة، سنضع قيم افتراضية لمنع الخطأ
          if [ -z "$V1" ] || [ -z "$V2" ]; then
            echo "Warning: Secrets are empty, using defaults."
            JSON_ARRAY="[\"3.11\", \"3.12\"]"
          else
            JSON_ARRAY="[\"$V1\", \"$V2\"]"
          fi
          
          echo "Generated JSON: $JSON_ARRAY"
          # إرسال المصفوفة للمخرجات
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  run-tests:
    # التأكد من كتابة اسم الجوب السابقة بدقة هنا
    needs: prepare-matrix
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # استدعاء المخرج باستخدام المسار الكامل: needs.<job_id>.outputs.<output_name>
        python-version: ${{ fromJson(needs.prepare-matrix.outputs.matrix-versions) }}
        
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v
