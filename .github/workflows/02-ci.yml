# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

jobs:
  # الجوب الأولى: تجهيز مصفوفة النسخ من السيكريتات
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - id: set-matrix
        run: |
          # قراءة السيكريتات ووضعها في مصفوفة JSON
          VERSION1="${{ secrets.secret1 }}"
          VERSION2="${{ secrets.secret2 }}"
          JSON_ARRAY="[\"$VERSION1\", \"$VERSION2\"]"
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  # الجوب الثانية: تشغيل الاختبارات بناءً على المصفوفة الناتجة
  run-tests:
    needs: prepare-matrix
    # الـ Runner هو الجهاز المؤقت الذي ينفذ الخطوات أدناه.
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # استدعاء المخرج (Output) من الجوب السابقة وتحويله لمصفوفة
        python-version: ${{ fromJson(needs.prepare-matrix.outputs.matrix-versions) }}
        
    steps:
      - name: Check out repository
        # تنزيل محتويات المستودع على الـ Runner.
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        # إعداد بيئة بايثون بالنسخة المحددة من الماتريكس.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        # خطوة التحقق الأساسية في الـ CI.
        run: python -m unittest discover -s tests -v
