name: 02 CI Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set Python versions from secret
        run: |
          echo "VERSIONS=${{ secrets.secret }}" >> $GITHUB_ENV

      - name: Run tests for each version
        run: |
          for version in $(echo $VERSIONS | tr ',' ' '); do
            echo "=============================="
            echo "Running on Python $version"
            echo "=============================="

            # Setup Python
            sudo apt-get update
            sudo apt-get install -y python$version

            python$version --version

            # Run tests
            python$version -m unittest discover -s tests -v
          done
