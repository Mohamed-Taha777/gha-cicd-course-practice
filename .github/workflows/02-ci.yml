name: 02 CI Workflow

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix-versions: ${{ steps.set-matrix.outputs.versions }}
    steps:
      - id: set-matrix
        run: |
          # نفترض أن السيكريت جواه "3.11, 3.12"
          RAW_DATA="${{ secrets.secret1 }}"
          
          # تحويل النص إلى مصفوفة JSON: ["3.11", "3.12"]
          # بنشيل المسافات ونقسم بناءً على الفاصلة
          JSON_ARRAY=$(echo $RAW_DATA | jq -R 'split(",") | map(gsub(" "; ""))' -c)
          
          echo "versions=$JSON_ARRAY" >> $GITHUB_OUTPUT

  run-tests:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJson(needs.prepare-matrix.outputs.matrix-versions) }}
        
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v
